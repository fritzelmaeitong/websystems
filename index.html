<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Barangay Blotter Reporting System - Login</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1>Barangay Blotter Reporting System</h1>
    <h2>Login</h2>
    
    <form id="loginForm">
      <div class="radio-group">
        <label>
          <input type="radio" name="role" value="admin">
          Login as Admin
        </label>
        <label>
          <input type="radio" name="role" value="resident">
          Login as Resident
        </label>
      </div>
      
      <label for="username">Username</label>
      <input type="text" id="username" required>
      
      <label for="password">Password</label>
      <input type="password" id="password" required>
      
      <button type="submit">Login</button>
    </form>
    
    <p>Not registered? <a href="register.html" class="link">Register as Resident</a></p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/supabase-client.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/modals.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/admin.js"></script>
  <script src="js/blotter.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
